<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Fluid Notes Offline</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06111E;
      --surface: #0E1B2A;
      --border: rgba(24, 73, 108, 0.9);
      --text: #E5E7EB;
      --muted: #9EB0C2;
      --accent: #F6C35C;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 10%, #0B2338 0%, #06111E 42%, #050D18 100%);
      color: var(--text);
    }

    .card {
      width: min(560px, 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      padding: 1.2rem;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0 0 0.5rem;
      color: var(--accent);
      font-size: 1.3rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .nav-links a {
      flex: 1 1 auto;
      text-align: center;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      background: rgba(246, 195, 92, 0.12);
      border: 1px solid rgba(246, 195, 92, 0.3);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    .nav-links a:hover,
    .nav-links a:focus {
      background: rgba(246, 195, 92, 0.22);
      outline: none;
    }
  </style>
</head>
<body>
  <article class="card" aria-live="polite">
    <h1>Offline mode</h1>
    <p>Fluid Notes is currently offline. Previously visited Diary, Notes, and To Do pages remain available until your next sync.</p>
    <nav class="nav-links" aria-label="Cached pages">
      <a href="/diary/">Diary</a>
      <a href="/notes/">Notes</a>
      <a href="/todo/">To Do</a>
    </nav>
  </article>
</body>
</html>
