<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #121212 0%, #1A1C22 100%);
      color: #FFFFFF;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .login-shell {
      width: min(420px, calc(100% - 2rem));
      background: rgba(37, 40, 51, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }
    .login-shell h1 {
      margin-bottom: 0.5rem;
      font-size: 2rem;
      color: #FFFFFF;
    }
    .login-shell p {
      color: #A0AEC0;
      margin-bottom: 1.75rem;
    }
    .form-control,
    .btn-primary {
      border-radius: 14px;
    }
    .btn-primary {
      background: #6366F1;
      border-color: #6366F1;
    }
    .btn-primary:hover,
    .btn-primary:focus {
      background: #4F46E5;
      border-color: #4F46E5;
    }
    .form-label {
      color: #E2E8F0;
      font-weight: 600;
    }
    .form-text {
      color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <h1>Sign in</h1>
    <p>Access your calendar and world clock dashboard.</p>
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="alert alert-danger" role="alert">
          {{ form.non_field_errors }}
        </div>
      {% endif %}
      <div class="mb-3">
        <label for="id_username" class="form-label">Username</label>
        {{ form.username }}
      </div>
      <div class="mb-3">
        <label for="id_password" class="form-label">Password</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
  </div>
</body>
</html>
