<!-- templates/dashboard/diary.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Fluid Notes</title>
  {% load static %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/multimonth/index.global.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/bootstrap/main.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/multimonth/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/bootstrap/index.global.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06111E;
      --surface: #0E1B2A;
      --surface-strong: #091624;
      --surface-muted: #1F3A53;
      --text: #E5E7EB;
      --muted: #9EB0C2;
      --accent: #F6C35C;
      --accent-strong: #00C2FF;
      --border: rgba(24, 73, 108, 0.9);
      --border-soft: rgba(44, 91, 124, 0.92);
      --border-glow: rgba(0, 194, 255, 0.12);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      --page-bottom-gap: 16px;
      --top-nav-height: 82px;
    }

    html {
      font-size: clamp(15px, 0.18vw + 14.8px, 16.8px);
    }

    body {
      font-size: clamp(0.96rem, 0.08vw + 0.94rem, 1.02rem);
    }

    h1, .section-title, .utility-title, .diary-right-title, .notes-title {
      font-size: clamp(1.18rem, 0.55vw + 1.05rem, 1.46rem);
      line-height: 1.2;
    }

    h2, .title-inline, .pane-title {
      font-size: clamp(1rem, 0.3vw + 0.94rem, 1.16rem);
    }

    .nav-link, .mobile-menu-link, .mobile-bottom-btn {
      font-size: clamp(0.9rem, 0.2vw + 0.86rem, 0.98rem);
    }

    input, select, textarea, button, .btn {
      font-size: clamp(0.94rem, 0.14vw + 0.91rem, 1rem);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 10%, #0B2338 0%, #06111E 42%, #050D18 100%);
      color: var(--text);
      overflow: hidden;
    }

    .app-shell {
      display: grid;
      grid-template-columns: clamp(232px, 19vw, 252px) minmax(0, 1fr);
      height: 100vh;
      min-height: 0;
      width: 100%;
    }

    .sidebar {
      position: relative;
      min-width: 0;
      background: rgba(14, 27, 42, 0.82);
      color: var(--text);
      padding: 1rem 0.9rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .sidebar-brand {
      display: grid;
      gap: 0.25rem;
      padding: 0.25rem 0.35rem 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand {
      font-size: 1.16rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
      color: var(--accent);
    }

    .brand-logo {
      width: auto !important;
      max-width: 170px;
      height: auto !important;
      max-height: none !important;
      display: block;
      margin: 0 0 0.15rem;
      border-radius: 0;
      object-fit: contain;
      mix-blend-mode: screen;
      opacity: 0.98;
    }

    .brand-subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.84rem;
      font-weight: 500;
    }

    .nav-group {
      display: grid;
      gap: 0.35rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      color: #D9E7F2;
      text-decoration: none;
      padding: 0.72rem 0.8rem;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      font-weight: 600;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .nav-link:hover,
    .nav-link:focus {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
      color: #FFFFFF;
      outline: none;
    }

    .nav-link.active {
      background: rgba(0, 194, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.08);
      color: var(--accent);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 0.85rem 0.35rem 0;
      font-size: 0.82rem;
      color: #94A3B8;
      line-height: 1.5;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .sidebar-meta {
      display: block;
      margin-top: 0.3rem;
      color: #C9DAE7;
      font-size: 0.78rem;
    }

    body.nav-layout-tabs .app-shell {
      grid-template-columns: 112px 1fr;
    }

    body.nav-layout-tabs .sidebar {
      padding: 1.2rem 0.6rem;
      gap: 1rem;
    }

    body.nav-layout-tabs .brand-logo {
      max-width: 72px;
      margin: 0 auto 0.2rem;
    }

    body.nav-layout-tabs .brand-subtitle,
    body.nav-layout-tabs .sidebar-footer {
      display: none;
    }

    body.nav-layout-tabs .nav-link {
      text-align: center;
      padding: 0.62rem 0.3rem;
      font-size: 0.76rem;
      line-height: 1.2;
    }

    body.nav-layout-bottom {
      padding-bottom: 88px;
    }

    body.nav-layout-bottom .app-shell {
      grid-template-columns: 1fr;
    }

    body.nav-layout-bottom .sidebar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      padding: 0.55rem 0.6rem 0.65rem;
      border-right: none;
      border-top: 1px solid rgba(0, 194, 255, 0.3);
      background: rgba(10, 26, 42, 0.96);
      backdrop-filter: blur(8px);
      gap: 0.45rem;
    }

    body.nav-layout-bottom .sidebar > div:first-child,
    body.nav-layout-bottom .sidebar-footer {
      display: none;
    }

    body.nav-layout-bottom .nav-group {
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0.38rem;
    }

    body.nav-layout-bottom .nav-link {
      text-align: center;
      padding: 0.5rem 0.2rem;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      line-height: 1.2;
      border-radius: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    body.nav-layout-bottom .main {
      padding: 1rem 0.9rem;
      max-width: 100vw;
      height: calc(100vh - 88px);
      min-height: 0;
      padding-bottom: 0.75rem;
      overflow: hidden;
    }

    .main {
      padding: 1rem 1.15rem 1rem;
      height: 100vh;
      min-height: 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(1.75rem, 2.2vw, 2.5rem);
      color: var(--accent);
    }

    .topbar-meta {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .topbar-meta span {
      color: var(--muted);
    }

    .user-menu {
      padding: 0.75rem 1rem;
      background: rgba(0, 194, 255, 0.08);
      border-radius: 14px;
      box-shadow: var(--shadow);
      display: inline-flex;
      gap: 0.75rem;
      align-items: center;
      border: 1px solid rgba(0, 194, 255, 0.3);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 1rem;
      align-items: stretch;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .week-panel {
      min-width: 0;
      border-color: rgba(24, 73, 108, 0.4);
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    /* Match Notes-style shell: no heavy outer host card */
    .week-panel.panel {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
    }

    .entry-panel {
      align-self: stretch;
      max-height: 100%;
      overflow: auto;
      padding: 1rem;
    }

    .diary-left-stack {
      display: grid;
      gap: 1rem;
    }

    .mini-month {
      background: #111d30;
      border: 1px solid #1F4F70;
      border-radius: 16px;
      padding: 0.9rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .mini-month-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
      gap: 0.5rem;
    }

    .mini-month-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      color: #EAF4FF;
      letter-spacing: 0.01em;
    }

    .mini-month-nav {
      display: inline-flex;
      gap: 0.35rem;
    }

    .mini-month-btn {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid #2E4E68;
      background: #19283C;
      color: #C9DAE7;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .mini-month-btn:hover,
    .mini-month-btn:focus {
      background: #00C2FF;
      color: #06111E;
      border-color: #00C2FF;
      outline: none;
    }

    .mini-month-weekdays,
    .mini-month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0.3rem;
    }

    .mini-month-weekdays {
      margin-bottom: 0.35rem;
    }

    .mini-month-weekday,
    .mini-month-cell {
      text-align: center;
      font-size: 0.74rem;
      border-radius: 10px;
      padding: 0.28rem 0;
    }

    .mini-month-weekday {
      color: #9EB0C2;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 1px solid rgba(44, 91, 124, 0.34);
      background: rgba(9, 22, 36, 0.28);
    }

    .mini-month-cell {
      color: #D5E2EC;
      border: 1px solid rgba(44, 91, 124, 0.32);
      min-height: 1.75rem;
      display: grid;
      place-items: center;
    }

    .mini-month-cell.is-other {
      color: rgba(158, 176, 194, 0.45);
    }

    .mini-month-cell.is-today {
      color: #06111E;
      background: #F6C35C;
      font-weight: 700;
      border-color: #F6C35C;
    }

    .mini-month-cell.is-active {
      border-color: #00C2FF;
      box-shadow: inset 0 0 0 1px rgba(0, 194, 255, 0.35);
      background: rgba(0, 194, 255, 0.12);
    }

    .diary-right-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.15rem 0.2rem 0.8rem;
      flex-wrap: wrap;
    }

    .diary-right-title {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0;
      color: var(--accent);
      line-height: 1.2;
      font-weight: 700;
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      flex-wrap: wrap;
    }

    .diary-right-subtitle {
      font-size: 0.86rem;
      font-weight: 500;
      color: #9EB0C2;
      letter-spacing: 0;
    }

    .diary-view-controls {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .diary-view-switch {
      display: inline-flex;
      gap: 0.35rem;
      background: #111D30;
      border: 1px solid #244560;
      border-radius: 999px;
      padding: 0.25rem;
    }

    .diary-view-btn,
    .diary-today-btn {
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #B9CDDC;
      font-size: 0.8rem;
      padding: 0.35rem 0.75rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .diary-today-btn {
      border: 1px solid #244560;
      background: #111D30;
      color: #EAF4FF;
      padding-inline: 0.9rem;
    }

    .diary-view-btn.is-active,
    .diary-view-btn:hover,
    .diary-view-btn:focus,
    .diary-today-btn:hover,
    .diary-today-btn:focus {
      background: #F2F4F7;
      color: #06111E;
      outline: none;
    }

    .panel {
      background: linear-gradient(180deg, #102033 0%, #0D1A2A 100%);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-soft);
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .panel h2.title-inline {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      flex-wrap: wrap;
      margin-bottom: 0.55rem;
    }

    .panel h2 .title-blurb {
      font-size: 0.74em;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .panel small {
      color: var(--muted);
    }

    .calendar-wrapper {
      margin-top: 0;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .calendar-glass-shell {
      width: 100%;
      min-height: 0;
      height: 100%;
      border-radius: 18px;
      padding: 0.6rem;
      background: rgba(8, 18, 30, 0.46);
      border: none;
      box-shadow: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .calendar-scroll-wrapper {
      height: calc(100vh - 170px);
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .calendar-scroll-wrapper.month-scroll-active {
      overscroll-behavior-y: contain;
    }

    .calendar-scroll-wrapper::-webkit-scrollbar {
      width: 8px;
    }

    .calendar-scroll-wrapper::-webkit-scrollbar-thumb {
      background: rgba(0, 194, 255, 0.34);
      border-radius: 999px;
    }

    #calendar {
      min-height: 0;
      height: auto;
      width: 100%;
      background: transparent;
      border: none;
      padding: 0;
      border-radius: 14px;
      box-shadow: none;
    }

    #calendar .fc-prev-button,
    #calendar .fc-next-button {
      display: none !important;
    }

    #calendar .fc-view-harness,
    #calendar .fc-scroller-liquid-absolute,
    #calendar .fc-scroller {
      min-height: 0 !important;
      height: auto !important;
    }

    /* Add Diary Entry Form */
    .diary-form {
      margin-bottom: 0;
      padding: 0.9rem;
      background: #0A1A2A;
      border-radius: 12px;
      border: 1px solid #1B4A67;
    }

    .diary-form .form-grid {
      display: grid;
      gap: 0.75rem;
    }

    .diary-form input,
    .diary-form select,
    .diary-form textarea {
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid #1F4F70;
      background: #08131F;
      color: #E5E7EB;
    }

    .diary-form textarea {
      resize: vertical;
      min-height: 100px;
    }

    .diary-category-row {
      display: flex;
      gap: 0.65rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .diary-category-row select {
      flex: 1;
      min-width: 180px;
    }

    .diary-category-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(56, 189, 248, 0.45);
      background: rgba(56, 189, 248, 0.2);
      color: #E5E7EB;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Requested diary color scheme */
    .diary-container {
      background: #0E1B2A;
      color: #E5E7EB;
      padding: 24px;
      border-radius: 10px;
      border: 1px solid #1B4A67;
      max-width: none;
      margin: 0;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.45);
    }

    .diary-container h1,
    .diary-container h2 {
      color: var(--accent);
      margin-bottom: 16px;
      font-weight: 600;
    }

    .diary-textarea {
      width: 100%;
      min-height: 220px;
      background: #08131F;
      color: #E5E7EB;
      border: 1px solid #1F4F70;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      resize: vertical;
    }

    .diary-button {
      background: var(--accent-strong);
      color: #06111E;
      padding: 10px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .diary-button:hover {
      background: var(--accent);
      color: #06111E;
    }

    .diary-delete-btn {
      border: 1px solid #35546D;
      border-radius: 8px;
      background: #102638;
      color: #8EA0B1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.45rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .diary-delete-btn:hover,
    .diary-delete-btn:focus {
      background: rgba(251, 113, 133, 0.18);
      color: #FB7185;
      border-color: rgba(251, 113, 133, 0.45);
      outline: none;
    }

    /* Calendar styling: Apple-like glass treatment */
    .fc {
      color: rgba(255, 255, 255, 0.9);
      font-family: inherit;
      --fc-border-color: transparent;
      --fc-page-bg-color: transparent;
      --fc-neutral-bg-color: transparent;
      --fc-list-event-hover-bg-color: rgba(255, 255, 255, 0.08);
      --fc-today-bg-color: rgba(123, 212, 255, 0.16);
    }

    .fc-theme-standard td,
    .fc-theme-standard th,
    .fc .fc-scrollgrid,
    .fc .fc-scrollgrid-section,
    .fc .fc-col-header-cell,
    .fc .fc-daygrid-day,
    .fc .fc-timegrid-col,
    .fc .fc-timegrid-slot,
    .fc .fc-timegrid-axis,
    .fc .fc-timegrid-divider,
    .fc .fc-timegrid-slots table,
    .fc .fc-timegrid-cols table,
    .fc .fc-timegrid-body,
    .fc .fc-scroller {
      border: none !important;
    }

    .fc .fc-toolbar.fc-header-toolbar {
      background: rgba(255, 255, 255, 0.08);
      color: #F4F8FC;
      padding: 0.95rem 1rem;
      border-radius: 14px;
      margin-bottom: 1rem;
      border: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      gap: 0.8rem;
    }

    .fc .fc-toolbar-title {
      font-size: clamp(1.25rem, 1vw + 1rem, 1.375rem);
      font-weight: 650;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.98);
      text-shadow: 0 2px 8px rgba(6, 12, 20, 0.45);
    }

    .fc .fc-toolbar-chunk {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }

    .fc .fc-button,
    .fc .fc-button-primary {
      background: rgba(255, 255, 255, 0.1) !important;
      border: none !important;
      color: rgba(255, 255, 255, 0.86) !important;
      border-radius: 12px !important;
      padding: 0.52rem 0.92rem !important;
      font-size: 0.92rem !important;
      font-weight: 600 !important;
      line-height: 1.2 !important;
      text-shadow: 0 1px 3px rgba(6, 12, 20, 0.45);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
      transition: transform 0.18s ease, background 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
    }

    .fc .fc-button:hover,
    .fc .fc-button-primary:hover {
      background: rgba(255, 255, 255, 0.2) !important;
      color: #FFFFFF !important;
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .fc .fc-button:active,
    .fc .fc-button.fc-button-active,
    .fc .fc-button-primary:active,
    .fc .fc-button-primary.fc-button-active {
      background: linear-gradient(180deg, rgba(246, 195, 92, 0.86), rgba(244, 164, 60, 0.8)) !important;
      color: #08131F !important;
      transform: translateY(0);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
    }

    .fc .fc-daygrid-day,
    .fc .fc-timegrid-col,
    .fc .fc-timegrid-slot-label,
    .fc .fc-col-header-cell,

  <script>
  const diaryModal = document.getElementById('event-modal');
  const diaryPanel = document.getElementById('event-modal-content');
  const diaryClose = document.getElementById('diary-panel-close');
  const diaryModalCloseBtn = document.getElementById('diary-modal-close-btn');
  const diaryForm = document.getElementById('diary-entry-form');
  const diaryTitle = document.getElementById('diary-panel-title');
  const entryTitle = document.getElementById('entry-title');
  const entryDate = document.getElementById('entry-date');
  const entryContent = document.getElementById('entry-content');
  const entryEndDate = document.getElementById('entry-end-date');
  const entryStartTime = document.getElementById('entry-start-time');
  const entryEndTime = document.getElementById('entry-end-time');
  const calendarViewType = document.getElementById('calendar-view-type');
  const calendarViewDate = document.getElementById('calendar-view-date');

  function openDiaryPanel({title = '', date = '', content = '', mode = 'new'}) {
        // Set current calendar view and date for redirect after save
        if (window.calendar) {
          if (calendarViewType) calendarViewType.value = window.calendar.view.type;
          if (calendarViewDate) calendarViewDate.value = window.calendar.getDate().toISOString().slice(0,10);
        }
    diaryModal.classList.add('active');
    diaryModal.setAttribute('aria-hidden', 'false');
    diaryTitle.textContent = mode === 'edit' ? 'Edit Diary Entry' : 'New Diary Entry';
    if (typeof title === 'string' && title !== '') entryTitle.value = title;
    if (typeof date === 'string' && date !== '') entryDate.value = date;
    if (typeof content === 'string' && content !== '') entryContent.value = content;
    setTimeout(() => entryTitle.focus(), 200);
  }

  function closeDiaryPanel() {
    diaryModal.classList.remove('active');
    diaryModal.setAttribute('aria-hidden', 'true');
  }

  diaryModal.addEventListener('click', function (event) {
    if (event.target === diaryModal) {
      closeDiaryPanel();
    }
  });
  diaryClose.addEventListener('click', closeDiaryPanel);
  if (diaryModalCloseBtn) {
    diaryModalCloseBtn.addEventListener('click', closeDiaryPanel);
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDiaryPanel(); });

  document.addEventListener('DOMContentLoaded', function() {
    if (window.calendar) {
      window.calendar.setOption('dateClick', function(info) {
        // Single day click: prefill date, clear times, open panel
        if (typeof prefillFromDate === 'function') {
          prefillFromDate(info.date, info.allDay);
        }
        if (typeof openDiaryPanel === 'function') {
          openDiaryPanel({date: info.dateStr, mode: 'new'});
        }
      });
      window.calendar.setOption('select', function(selectionInfo) {
        // Multi-day or time range selection: prefill all fields, open panel
        let endForPrefill = selectionInfo.end;
        if (!selectionInfo.allDay && endForPrefill) {
          // Subtract one minute from end to get the last selected slot
          endForPrefill = new Date(endForPrefill.getTime() - 60000);
        }
        if (typeof prefillFromDate === 'function') {
          prefillFromDate(selectionInfo.start, selectionInfo.allDay, endForPrefill);
        }
        if (typeof openDiaryPanel === 'function') {
          openDiaryPanel({mode: 'new'});
        }
      });
      window.calendar.setOption('eventClick', function(info) {
        openDiaryPanel({
          title: info.event.title,
          date: info.event.startStr.slice(0,10),
          content: info.event.extendedProps.content || '',
          mode: 'edit'
        });
      });
    }
  });
  </script>

  <script>
    (function () {

        bodyEl.classList.add('nav-position-top');
      }

      applyResponsiveNavLayout();

    })();

    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const diaryForm = document.getElementById('diary-entry-form');
      const titleInput = diaryForm ? diaryForm.querySelector('input[name="title"]') : null;
      const categoryInput = diaryForm ? diaryForm.querySelector('select[name="category"]') : null;
      const categoryBadge = document.getElementById('diary-category-badge');
      const dateInput = diaryForm ? diaryForm.querySelector('input[name="date"]') : null;
      const endDateInput = diaryForm ? diaryForm.querySelector('input[name="end_date"]') : null;
      const startTimeInput = diaryForm ? diaryForm.querySelector('input[name="start_time"]') : null;
      const endTimeInput = diaryForm ? diaryForm.querySelector('input[name="end_time"]') : null;
      const contentInput = diaryForm ? diaryForm.querySelector('textarea[name="content"]') : null;
      const entryIdInput = diaryForm ? diaryForm.querySelector('input[name="entry_id"]') : null;
      const submitButton = document.getElementById('diary-submit-btn');
      const cancelEditButton = document.getElementById('diary-cancel-edit');
      const deleteButton = document.getElementById('diary-delete-btn');
      const deleteRedirectDateInput = document.getElementById('diary-delete-redirect-date');
      const entryCards = document.querySelectorAll('.diary-entry[data-entry-id]');
      const selectionHint = document.getElementById('diary-selection-hint');
      const confirmModal = document.getElementById('confirm-modal');
      const confirmModalTitle = document.getElementById('confirm-modal-title');
      const confirmModalMessage = document.getElementById('confirm-modal-message');
      const confirmModalCancelBtn = document.getElementById('confirm-modal-cancel-btn');
      const confirmModalConfirmBtn = document.getElementById('confirm-modal-confirm-btn');
      const searchParams = new URLSearchParams(window.location.search);
      const queryDate = searchParams.get('date');
      const selectedEntryId = (searchParams.get('entry_id') || '').trim();
      const miniMonthTitle = document.getElementById('mini-month-title');
      const miniMonthGrid = document.getElementById('mini-month-grid');
      const miniPrevButton = document.getElementById('mini-month-prev');
      const miniNextButton = document.getElementById('mini-month-next');
      const diaryTodayButton = document.getElementById('diary-today-btn');
      const calendarScrollWrapper = document.getElementById('calendar-scroll-wrapper');
      const rightTitle = document.getElementById('diary-right-title');
      const viewSwitchButtons = Array.from(document.querySelectorAll('[data-diary-view]'));
      let requestedEntryLoaded = false;
      let allowDeleteSubmit = false;
      let lastCalendarScrollTop = 1;
      let scrollNavigationLocked = false;
      let suppressCalendarScroll = false;
      let scrollUnlockTimer = null;
      let scrollResetTimer = null;
      const selectedDate = /^\d{4}-\d{2}-\d{2}$/.test(queryDate || '') ? queryDate : '';
      const defaultViewMap = {
        year: 'dayGridMonth',
        month: 'dayGridMonth',
        week: 'timeGridWeek',
        day: 'timeGridWeek'
      };
      const initialDiaryView = defaultViewMap['{{ default_diary_view|default:"week" }}'] || 'timeGridWeek';

      if (!calendarEl) {
        console.error('calendar element not found');
        return;
      }

      function showConfirmModal(message, title) {
        if (!confirmModal || !confirmModalMessage || !confirmModalConfirmBtn || !confirmModalCancelBtn) {
          return Promise.resolve(false);
        }

        confirmModalTitle.textContent = title || 'Confirm action';
        confirmModalMessage.textContent = message;
        confirmModal.hidden = false;
        confirmModalConfirmBtn.focus();

        return new Promise(function (resolve) {
          let settled = false;

          function close(result) {
            if (settled) {
              return;
            }
            settled = true;
            confirmModal.hidden = true;
            confirmModal.removeEventListener('click', onBackdropClick);
            document.removeEventListener('keydown', onKeyDown);
            confirmModalCancelBtn.removeEventListener('click', onCancel);
            confirmModalConfirmBtn.removeEventListener('click', onConfirm);
            resolve(result);
          }

          function onCancel() {
            close(false);
          }

          function onConfirm() {
            close(true);
          }

          function onBackdropClick(event) {
            if (event.target === confirmModal) {
              close(false);
            }
          }

          function onKeyDown(event) {
            if (event.key === 'Escape') {
              close(false);
            }
          }

          confirmModal.addEventListener('click', onBackdropClick);
          document.addEventListener('keydown', onKeyDown);
          confirmModalCancelBtn.addEventListener('click', onCancel);
          confirmModalConfirmBtn.addEventListener('click', onConfirm);
        });
      }

      function setEditMode(editing) {
        if (!submitButton || !entryIdInput) return;
        submitButton.textContent = editing ? 'Update Diary Entry' : 'Add Diary Entry';
        if (cancelEditButton) {
          cancelEditButton.style.display = editing ? 'inline-flex' : 'none';
        }
        if (deleteButton) {
          deleteButton.style.display = editing ? 'block' : 'none';
        }
        if (selectionHint) {
          selectionHint.textContent = editing
            ? 'Editing existing entry. Update fields and click Update Diary Entry.'
            : 'Tip: only title is required. Date defaults to today if left blank.';
        }

        if (!editing) {
          entryIdInput.value = '';
        }
      }

      function updateCategoryBadge() {
        if (!categoryInput || !categoryBadge) return;

        const selectedOption = categoryInput.options[categoryInput.selectedIndex];
        const color = selectedOption ? selectedOption.dataset.color || '#38BDF8' : '#38BDF8';
        const label = selectedOption ? selectedOption.textContent.trim() : 'General';

        categoryBadge.textContent = label;
        categoryBadge.style.backgroundColor = `${color}33`;
        categoryBadge.style.borderColor = `${color}80`;
        categoryBadge.style.color = '#E5E7EB';
      }

      function resetFormForCreateMode() {
        if (!diaryForm) return;
        diaryForm.reset();
        updateCategoryBadge();
        setEditMode(false);
      }

      function loadEntryIntoForm(entry) {
        if (!entryIdInput || !titleInput || !dateInput || !contentInput) return;
        entryIdInput.value = entry.id || '';
        titleInput.value = entry.title || '';
        if (categoryInput) {
          categoryInput.value = entry.category || 'general';
          updateCategoryBadge();
        }
        dateInput.value = entry.date || '';
        if (deleteRedirectDateInput) {
          deleteRedirectDateInput.value = entry.date || '';
        }
        if (endDateInput) {
          endDateInput.value = entry.endDate || '';
        }
        if (startTimeInput) {
          startTimeInput.value = entry.startTime || '';
        }
        if (endTimeInput) {
          endTimeInput.value = entry.endTime || '';
        }
        contentInput.value = entry.content || '';
        setEditMode(true);
        titleInput.focus();
      }

      function formatTimeForInput(dateObj) {
        const hours = String(dateObj.getHours()).padStart(2, '0');
        const minutes = String(dateObj.getMinutes()).padStart(2, '0');
        return `${hours}:${minutes}`;
      }

      function formatDateForInput(dateObj) {
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      function prefillFromDate(dateObj, isAllDay, endDateObj) {
        if (!dateInput) return;

        const wasEditing = Boolean(entryIdInput && entryIdInput.value);

        if (entryDate) entryDate.value = formatDateForInput(dateObj);
        if (entryEndDate) {
          if (isAllDay) {
            entryEndDate.value = endDateObj ? formatDateForInput(endDateObj) : formatDateForInput(dateObj);
          } else {
            entryEndDate.value = '';
          }
        }
        if (entryStartTime && entryEndTime) {
          if (isAllDay) {
            entryStartTime.value = '';
            entryEndTime.value = '';
          } else {
            entryStartTime.value = formatTimeForInput(dateObj);
            if (endDateObj) {
              entryEndTime.value = formatTimeForInput(endDateObj);
            } else {
              const defaultEnd = new Date(dateObj.getTime() + 60 * 60 * 1000);
              entryEndTime.value = formatTimeForInput(defaultEnd);
            }
          }
        }

        if (selectionHint) {
          selectionHint.textContent = isAllDay
            ? 'Selected all-day slot. Set an end date for multi-day events, or leave equal for single-day.'
            : 'Selected time slot. Date and time were set; adjust duration as needed.';
        }

        if (titleInput) {
          titleInput.focus();
        }

        if (wasEditing) {
          if (titleInput) {
            titleInput.value = '';
          }
          if (contentInput) {
            contentInput.value = '';
          }
        }

        setEditMode(false);
      }

      function tryLoadRequestedEntry(events) {
        if (!selectedEntryId || requestedEntryLoaded || !Array.isArray(events)) return;

        const match = events.find(function (eventObj) {
          return String(eventObj.id || '') === selectedEntryId;
        });

        if (!match) return;

        loadEntryIntoForm({
          id: String(match.id || ''),
          title: match.title || '',
          category: match.extendedProps.formCategory || 'general',
          date: match.start ? formatDateForInput(match.start) : '',
          endDate: match.extendedProps.formEndDate || '',
          startTime: match.extendedProps.formStartTime || '',
          endTime: match.extendedProps.formEndTime || '',
          content: match.extendedProps.description || ''
        });

        requestedEntryLoaded = true;
      }

      const BANK_HOLIDAY_CACHE_KEY = 'fluid-notes-uk-bank-holidays-v1';
      let ukBankHolidayEventsCache = null;
      let ukBankHolidayFetchPromise = null;

      function filterBankHolidayEventsByRange(events, fetchInfo) {
        if (!Array.isArray(events) || !fetchInfo || !fetchInfo.start || !fetchInfo.end) {
          return Array.isArray(events) ? events : [];
        }

        const rangeStart = new Date(fetchInfo.start);
        const rangeEnd = new Date(fetchInfo.end);
        rangeStart.setMonth(rangeStart.getMonth() - 2);
        rangeEnd.setMonth(rangeEnd.getMonth() + 2);

        return events.filter(function (eventObj) {
          const eventDate = new Date(eventObj.start);
          return eventDate >= rangeStart && eventDate < rangeEnd;
        });
      }

      function getCachedBankHolidayEvents() {
        try {
          const cachedValue = window.localStorage.getItem(BANK_HOLIDAY_CACHE_KEY);
          if (!cachedValue) {
            return null;
          }

          const parsed = JSON.parse(cachedValue);
          if (Array.isArray(parsed)) {
            return parsed;
          }

          if (parsed && Array.isArray(parsed.events)) {
            return parsed.events;
          }
        } catch (error) {
          console.warn('Unable to read cached UK bank holidays.', error);
        }

        return null;
      }

      function setCachedBankHolidayEvents(events) {
        try {
          window.localStorage.setItem(BANK_HOLIDAY_CACHE_KEY, JSON.stringify({
            savedAt: Date.now(),
            events: events
          }));
        } catch (error) {
          console.warn('Unable to cache UK bank holidays.', error);
        }
      }

      function buildUkBankHolidayEvents(data) {
        const regionMap = [
          ['england-and-wales', 'England & Wales'],
          ['scotland', 'Scotland'],
          ['northern-ireland', 'Northern Ireland']
        ];
        const mergedEvents = new Map();

        regionMap.forEach(function ([divisionKey, divisionLabel]) {
          const divisionEvents = data && data[divisionKey] && Array.isArray(data[divisionKey].events)
            ? data[divisionKey].events
            : [];

          divisionEvents.forEach(function (holiday) {
            const holidayKey = `${holiday.date}__${holiday.title}`;
            if (!mergedEvents.has(holidayKey)) {
              mergedEvents.set(holidayKey, {
                id: `uk-bank-holiday-${holidayKey}`,
                title: holiday.title,
                start: holiday.date,
                allDay: true,
                display: 'block',
                classNames: ['uk-bank-holiday-event'],
                extendedProps: {
                  source: 'uk-bank-holiday',
                  holidayDivisions: [divisionLabel],
                  holidayNotes: holiday.notes || ''
                }
              });
              return;
            }

            const existing = mergedEvents.get(holidayKey);
            if (!existing.extendedProps.holidayDivisions.includes(divisionLabel)) {
              existing.extendedProps.holidayDivisions.push(divisionLabel);
            }
            if (!existing.extendedProps.holidayNotes && holiday.notes) {
              existing.extendedProps.holidayNotes = holiday.notes;
            }
          });
        });

        return Array.from(mergedEvents.values()).map(function (holidayEvent) {
          const divisionText = holidayEvent.extendedProps.holidayDivisions.join(', ');
          const notesText = holidayEvent.extendedProps.holidayNotes
            ? ` — ${holidayEvent.extendedProps.holidayNotes}`
            : '';

          holidayEvent.extendedProps.description = `${divisionText}${notesText}`;
          holidayEvent.title = `Bank Holiday · ${holidayEvent.title}`;
          return holidayEvent;
        });
      }

      function getUkBankHolidayEvents() {
        if (Array.isArray(ukBankHolidayEventsCache)) {
          return Promise.resolve(ukBankHolidayEventsCache);
        }

        const cachedEvents = getCachedBankHolidayEvents();
        if (Array.isArray(cachedEvents) && cachedEvents.length) {
          ukBankHolidayEventsCache = cachedEvents;
          return Promise.resolve(ukBankHolidayEventsCache);
        }

        if (ukBankHolidayFetchPromise) {
          return ukBankHolidayFetchPromise;
        }

        ukBankHolidayFetchPromise = fetch('https://www.gov.uk/bank-holidays.json')
          .then(function (response) {
            if (!response.ok) {
              throw new Error(`Bank holiday request failed with status ${response.status}`);
            }
            return response.json();
          })
          .then(function (data) {
            const holidays = buildUkBankHolidayEvents(data);
            ukBankHolidayEventsCache = holidays;
            setCachedBankHolidayEvents(holidays);
            return holidays;
          })
          .catch(function (error) {
            console.warn('Unable to load UK bank holidays.', error);
            ukBankHolidayEventsCache = Array.isArray(cachedEvents) ? cachedEvents : [];
            return ukBankHolidayEventsCache;
          })
          .finally(function () {
            ukBankHolidayFetchPromise = null;
          });

        return ukBankHolidayFetchPromise;
      }

      function setActiveDiaryViewButton(viewType) {
        viewSwitchButtons.forEach(function (button) {
          const isActive = button.dataset.diaryView === viewType;
          button.classList.toggle('is-active', isActive);
          button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
      }

      function syncMonthScrollMode(viewType) {
        const isMonthView = viewType === 'dayGridMonth';
        if (!calendarScrollWrapper) {
          return;
        }

        calendarScrollWrapper.classList.toggle('month-scroll-active', isMonthView);

        if (isMonthView) {
          suppressCalendarScroll = true;
          calendarScrollWrapper.scrollTop = 1;
          lastCalendarScrollTop = 1;
          window.clearTimeout(scrollResetTimer);
          scrollResetTimer = window.setTimeout(function () {
            suppressCalendarScroll = false;
          }, 80);
        }
      }

      function resetMonthScrollPosition() {
        if (!calendarScrollWrapper) {
          return;
        }

        suppressCalendarScroll = true;
        calendarScrollWrapper.scrollTop = 1;
        lastCalendarScrollTop = 1;
        window.clearTimeout(scrollResetTimer);
        scrollResetTimer = window.setTimeout(function () {
          suppressCalendarScroll = false;
        }, 90);
      }

      function triggerMonthScrollNavigation(direction) {
        if (!window.calendar || window.calendar.view.type !== 'dayGridMonth' || scrollNavigationLocked) {
          return;
        }

        scrollNavigationLocked = true;
        if (direction === 'down') {
          window.calendar.next();
        } else if (direction === 'up') {
          window.calendar.prev();
        }

        resetMonthScrollPosition();
        window.clearTimeout(scrollUnlockTimer);
        scrollUnlockTimer = window.setTimeout(function () {
          scrollNavigationLocked = false;
        }, 420);
      }

      function handleCalendarScrollNavigation() {
        if (!calendarScrollWrapper || !window.calendar || window.calendar.view.type !== 'dayGridMonth' || suppressCalendarScroll || scrollNavigationLocked) {
          return;
        }

        const currentScrollTop = calendarScrollWrapper.scrollTop;
        const delta = currentScrollTop - lastCalendarScrollTop;
        lastCalendarScrollTop = currentScrollTop;

        if (Math.abs(delta) < 26) {
          return;
        }

        if (delta > 0) {
          triggerMonthScrollNavigation('down');
        } else {
          triggerMonthScrollNavigation('up');
        }
      }

      function handleCalendarWheelNavigation(event) {
        if (!window.calendar || window.calendar.view.type !== 'dayGridMonth' || scrollNavigationLocked) {
          return;
        }

        if (Math.abs(event.deltaY) < 20) {
          return;
        }

        event.preventDefault();
        triggerMonthScrollNavigation(event.deltaY > 0 ? 'down' : 'up');
      }

      function renderMiniMonth(anchorDate, currentViewDate) {
        if (!miniMonthTitle || !miniMonthGrid || !anchorDate) {
          return;
        }

        const titleFormatter = new Intl.DateTimeFormat('en-GB', {
          month: 'long',
          year: 'numeric'
        });
        miniMonthTitle.textContent = titleFormatter.format(anchorDate);

        miniMonthGrid.innerHTML = '';
        const year = anchorDate.getFullYear();
        const month = anchorDate.getMonth();
        const firstDay = new Date(year, month, 1);
        const mondayStartOffset = (firstDay.getDay() + 6) % 7;
        const gridStart = new Date(year, month, 1 - mondayStartOffset);
        const today = new Date();
        const todayKey = formatDateForInput(today);
        const activeKey = currentViewDate ? formatDateForInput(currentViewDate) : '';

        for (let i = 0; i < 42; i += 1) {
          const day = new Date(gridStart);
          day.setDate(gridStart.getDate() + i);

          const cell = document.createElement('span');
          cell.className = 'mini-month-cell';
          cell.textContent = String(day.getDate());
          const dayKey = formatDateForInput(day);

          if (day.getMonth() !== month) {
            cell.classList.add('is-other');
          }

          if (dayKey === todayKey) {
            cell.classList.add('is-today');
          }

          if (activeKey && dayKey === activeKey) {
            cell.classList.add('is-active');
          }

          miniMonthGrid.appendChild(cell);
        }
      }


      window.calendar = new FullCalendar.Calendar(calendarEl, {
        themeSystem: 'bootstrap',
        locale: 'en-gb',
        initialView: initialDiaryView,
        initialDate: selectedDate || undefined,
        slotDuration: '00:30:00',
        snapDuration: '00:30:00',
        slotLabelInterval: '00:30:00',
        slotLabelFormat: {
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        },
        slotLabelContent: null,
        firstDay: 1,
        selectable: true,
        selectMirror: true,
        height: 'auto',
        contentHeight: 'auto',
        expandRows: true,
        handleWindowResize: true,
        fixedWeekCount: false,
        headerToolbar: {
          left: '',
          center: 'title',
          right: ''
        },
        buttonText: {
          year: 'Year',
          today: 'Today',
          month: 'Month',
          week: 'Week',
          day: 'Day'
        },
        eventDisplay: 'block',
        views: {
          multiMonthYear: {
            type: 'multiMonth',
            duration: { years: 1 },
            multiMonthMaxColumns: 4,
            eventDisplay: 'none'
          },
          dayGridMonth: {
            eventDisplay: 'block'
          }
        },
        eventSources: [
          {
            url: '/api/diary/'
          },
          {
            id: 'uk-bank-holidays',
            events: function (fetchInfo, successCallback, failureCallback) {
              getUkBankHolidayEvents()
                .then(function (holidayEvents) {
                  successCallback(filterBankHolidayEventsByRange(holidayEvents, fetchInfo));
                })
                .catch(function (error) {
                  console.warn('Unable to render UK bank holidays.', error);
                  failureCallback(error);
                });
            }
          }
        ],
        eventsSet: function (events) {
          tryLoadRequestedEntry(events);
        },
        datesSet: function (info) {
          syncMonthScrollMode(info.view.type);
          setActiveDiaryViewButton(info.view.type);
          const activeDate = window.calendar.getDate();
          renderMiniMonth(activeDate, activeDate);
        },
        eventDidMount: function (info) {
          if (info.view.type === 'multiMonthYear') {
            info.el.style.display = 'none';
            return;
          }

          const eventSource = info.event.extendedProps.source || '';
          if (eventSource === 'uk-bank-holiday') {
            info.el.classList.add('uk-bank-holiday-event');
            return;
          }

          const categoryKey = info.event.extendedProps.category || info.event.extendedProps.formCategory || 'general';
          info.el.classList.add(`diary-event-${categoryKey}`);

          if (info.view.type === 'dayGridMonth') {
            const dot = info.el.querySelector('.fc-daygrid-event-dot, .fc-event-dot');
            if (dot) {
              dot.style.display = 'none';
            }
          }

          // Trash bin button for quick deletion
          const trashBtn = document.createElement('button');
          trashBtn.type = 'button';
          trashBtn.className = 'diary-event-trash-btn';
          trashBtn.setAttribute('aria-label', 'Delete diary entry');
          trashBtn.setAttribute('title', 'Delete diary entry');
          trashBtn.innerHTML = '<svg viewBox="0 0 24 24" width="11" height="11" aria-hidden="true" focusable="false"><path fill="currentColor" d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v8h-2V9zm4 0h2v8h-2V9zM7 9h2v8H7V9z"/></svg>';
          trashBtn.addEventListener('click', async function (e) {
            e.stopPropagation();
            e.preventDefault();
            const confirmed = await showConfirmModal('Delete this diary entry?', 'Delete Diary Entry');
            if (!confirmed) return;
            const quickDeleteForm = document.getElementById('diary-quick-delete-form');
            if (!quickDeleteForm) return;
            document.getElementById('diary-quick-delete-entry-id').value = info.event.id;
            document.getElementById('diary-quick-delete-redirect-date').value = info.event.start ? info.event.start.toISOString().slice(0, 10) : '';
            if (window.calendar) {
              document.getElementById('diary-quick-delete-view').value = window.calendar.view.type;
              document.getElementById('diary-quick-delete-calendar-date').value = window.calendar.getDate().toISOString().slice(0, 10);
            }
            quickDeleteForm.submit();
          });
          info.el.style.position = 'relative';
          info.el.appendChild(trashBtn);
        },
        eventClick: function (info) {
          if ((info.event.extendedProps.source || '') === 'uk-bank-holiday') {
            info.jsEvent.preventDefault();
            if (selectionHint) {
              selectionHint.textContent = `${info.event.title} is a read-only UK bank holiday.`;
            }
            return;
          }

          loadEntryIntoForm({
            id: String(info.event.id || ''),
            title: info.event.title || '',
            category: info.event.extendedProps.formCategory || 'general',
            date: info.event.start ? formatDateForInput(info.event.start) : '',
            endDate: info.event.extendedProps.formEndDate || '',
            startTime: info.event.extendedProps.formStartTime || '',
            endTime: info.event.extendedProps.formEndTime || '',
            content: info.event.extendedProps.description || ''
          });
          if (typeof openDiaryPanel === 'function') {
            openDiaryPanel({
              title: info.event.title || '',
              date: info.event.start ? formatDateForInput(info.event.start) : '',
              content: info.event.extendedProps.description || '',
              mode: 'edit'
            });
          }
        },
        dateClick: function (info) {
          if (typeof prefillFromDate === 'function') {
            prefillFromDate(info.date, info.allDay);
          }
          if (typeof openDiaryPanel === 'function') {
            openDiaryPanel({date: info.dateStr, mode: 'new'});
          }
        },
        select: function (selectionInfo) {
          if (typeof prefillFromDate === 'function') {
            prefillFromDate(selectionInfo.start, selectionInfo.allDay, selectionInfo.end);
          }
          if (typeof openDiaryPanel === 'function') {
            openDiaryPanel({date: selectionInfo.startStr, mode: 'new'});
          }
          window.calendar.unselect();
        }
      });

      window.calendar.render();
      syncMonthScrollMode(window.calendar.view.type);

      if (calendarScrollWrapper) {
        calendarScrollWrapper.addEventListener('scroll', handleCalendarScrollNavigation, { passive: true });
        calendarScrollWrapper.addEventListener('wheel', handleCalendarWheelNavigation, { passive: false });
      }

      if (miniPrevButton) {
        miniPrevButton.addEventListener('click', function () {
          window.calendar.prev();
          resetMonthScrollPosition();
        });
      }

      if (miniNextButton) {
        miniNextButton.addEventListener('click', function () {
          window.calendar.next();
          resetMonthScrollPosition();
        });
      }

      if (diaryTodayButton) {
        diaryTodayButton.addEventListener('click', function () {
          window.calendar.today();
          resetMonthScrollPosition();
          setActiveDiaryViewButton(window.calendar.view.type);
        });
      }

      viewSwitchButtons.forEach(function (button) {
        button.addEventListener('click', function () {
          const targetView = button.dataset.diaryView;
          if (!targetView) {
            return;
          }
          window.calendar.changeView(targetView);
          syncMonthScrollMode(targetView);
          setActiveDiaryViewButton(targetView);
        });
      });

      setActiveDiaryViewButton(window.calendar.view.type);
      renderMiniMonth(calendar.getDate(), calendar.getDate());

      if (selectedDate && dateInput && !(entryIdInput && entryIdInput.value)) {
        dateInput.value = selectedDate;
        if (selectionHint) {
          selectionHint.textContent = 'Opened from dashboard selection. Date was prefilled from your clicked day.';
        }
      }

      if (categoryInput) {
        categoryInput.addEventListener('change', updateCategoryBadge);
      }
      updateCategoryBadge();

      if (cancelEditButton) {
        cancelEditButton.addEventListener('click', function () {
          resetFormForCreateMode();
        });
      }

      if (deleteButton) {
        deleteButton.addEventListener('click', async function (event) {
          if (allowDeleteSubmit) {
            allowDeleteSubmit = false;
            return;
          }

          if (!entryIdInput || !entryIdInput.value) {
            event.preventDefault();
            return;
          }

          event.preventDefault();
          const confirmed = await showConfirmModal('Delete this diary entry?', 'Delete Diary Entry');
          if (!confirmed) {
            return;
          }

          allowDeleteSubmit = true;
          if (diaryForm && typeof diaryForm.requestSubmit === 'function') {
            diaryForm.requestSubmit(deleteButton);
            return;
          }

          if (deleteButton.form) {
            deleteButton.form.submit();
          }
        });
      }

      entryCards.forEach(function (card) {
        card.addEventListener('click', function () {
          loadEntryIntoForm({
            id: card.dataset.entryId || '',
            title: card.dataset.title || '',
            date: card.dataset.date || '',
            endDate: card.dataset.endDate || '',
            startTime: card.dataset.startTime || '',
            endTime: card.dataset.endTime || '',
            content: card.dataset.content || ''
          });
        });
      });
    });

    (function () {
      const el = document.querySelector('.js-sidebar-datetime');
      if (!el) return;

      function updateSidebarDateTime() {
        const now = new Date();
        const datePart = now.toLocaleDateString('en-GB', {
          weekday: 'short',
          day: '2-digit',
          month: 'short',
          year: 'numeric'
        });
        const timePart = now.toLocaleTimeString('en-GB', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        });
        el.textContent = `${datePart} | ${timePart}`;
      }

      updateSidebarDateTime();
      setInterval(updateSidebarDateTime, 1000);
    })();
  </script>

  <script>
    (function () {
      document.addEventListener('DOMContentLoaded', function () {
        const toggle = document.getElementById('mobile-menu-toggle');
        const backdrop = document.getElementById('mobile-menu-backdrop');
        const sheet = document.getElementById('mobile-menu-sheet');
        if (!toggle || !backdrop || !sheet) return;

        function closeMenu() {
          document.body.classList.remove('mobile-menu-open');
          toggle.setAttribute('aria-expanded', 'false');
        }

        function openMenu() {
          document.body.classList.add('mobile-menu-open');
          toggle.setAttribute('aria-expanded', 'true');
        }

        toggle.setAttribute('aria-expanded', 'false');
        toggle.addEventListener('click', function () {
          if (document.body.classList.contains('mobile-menu-open')) {
            closeMenu();
          } else {
            openMenu();
          }
        });

        backdrop.addEventListener('click', closeMenu);
        sheet.querySelectorAll('a').forEach(function (link) {
          link.addEventListener('click', closeMenu);
        });
        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') closeMenu();
        });
      });
    })();
  </script>
</body>
</html>
